- name: datatypes 
  hosts: local
  connection: local
  vars:
    course: "ansible with aws" #string
    duration: 120 # digit/number
    is_live: true #boolean

    #lists
    tools: #["linux", "shell", "ansible"] we can write like this also
    - "linux"
    - shell
    - ansible
    concepts:  #dictionary / map
      cloud: aws
      cm: ansible
  tasks:
  - name: print course info
    ansible.builtin.debug:
      msg: "course name: {{course}}, duration: {{duration}}, is it live: {{is_live}}, tools are: {{tools}} concepts are: {{concepts}}"
