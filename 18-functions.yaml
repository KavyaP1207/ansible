- name: functions
  hosts: local
  connection: local
  vars:
    technologies: Devops, linux, shell, ansible #string
    name: "kavya reddy"
    gmail: "kavyareddy@GMAIL.COM"
    ipaddress: 10.0.30.126 #1253:1564:565:566  #will get err bcoz max ipaddress is 255.255.255.255
    ipaddress:
    # dictionary==map
    tags:
      Application: payment
      Environment: Dev
    listTags:
    - key: Application
      value: payment
    - key: Environment
      value: Dev
  tasks:
  - name: default variables
    ansible.builtin.debug:
      msg: "hello, {{ name | default('kavya') }}"
  
  #string to list
  - name: convert string to list
    ansible.builtin.debug:
      msg: "technologies are: {{ technologies | split(',')}}"
  
  - name: convert map to list
    ansible.builtin.debug:
      msg: "tags are : {{ tags | dict2items }}"

  - name: convert list into map
    ansible.builtin.debug:
      msg: "tags are : {{ listTags | items2dict}}"
    
  - name: read yaml and take it into variables
    ansible.builtin.set_fact:
      student_yaml: "{{ lookup('file', 'student.yaml') | from_yaml }}"

  - name: convert yaml into json
    ansible.builtin.debug:
      msg: "json: {{ student_yaml | to_json }}"

  - name: save json to file
    ansible.builtin.copy:
      dest: ./student-data.json
      content: "{{ student_yaml | to_nice_json }}"

  - name: convert into uppercase
    ansible.builtin.debug:
      msg: "{{ name | upper }}"

  - name: convert into lowercase
    ansible.builtin.debug:
      msg: "{{ gmail | lower }}"
    
  - name: check ipaddress is correct or not 
    ansible.builtin.debug: "{{ ipaddress | ansible.utils.ipv4 }}"